name: "CI: Test"

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths-ignore:
      - "**.md"

jobs:
  results:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Test (matrix)
    needs: test
    steps:
      - name: Check build matrix status
        if: ${{ needs.test.result != 'success' }}
        run: exit 1

  test:
    name: Test
    strategy:
      matrix:
        qt_version:
          - 5.15.0
          - 6.11.1
          - 6.8.3
        platform:
          - ubuntu-latest
          - windows-2025-vs2026
          - macos-15-intel
        include:
          - qt_version: 6.11.1
            additional_arguments: -D QT_DEFAULT_MAJOR_VERSION=6
          - qt_version: 6.8.3
            additional_arguments: -D QT_DEFAULT_MAJOR_VERSION=6
          - platform: ubuntu-latest
            make: make
            CXXFLAGS: -Wall -Wextra -pedantic -Werror
            MAKEFLAGS: -j2
          - platform: macos-15-intel
            make: make
            CXXFLAGS: -Wall -Wextra -pedantic -Werror
            MAKEFLAGS: -j3
          - platform: windows-2025-vs2026
            make: nmake
            CXXFLAGS: /W4 /WX /MP

    runs-on: ${{ matrix.platform }}
    env:
      CXXFLAGS: ${{ matrix.CXXFLAGS }}
      MAKEFLAGS: ${{ matrix.MAKEFLAGS }}

    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}

      - name: Setup MSVC environment for QMake
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build library with CMake
        run: |
          cmake . ${{ matrix.additional_arguments }}
          cmake --build .

      - name: Build basic example with CMake
        working-directory: examples/basic/
        run: |
          cmake . ${{ matrix.additional_arguments }}
          cmake --build .

      - name: Build calculator example with CMake
        working-directory: examples/calculator/
        run: |
          cmake . ${{ matrix.additional_arguments }}
          cmake --build .

      - name: Build sending_arguments example with CMake
        working-directory: examples/sending_arguments/
        run: |
          cmake . ${{ matrix.additional_arguments }}
          cmake --build .

      - name: Build separate_object example with CMake
        working-directory: examples/separate_object/
        run: |
          cmake . ${{ matrix.additional_arguments }}
          cmake --build .

      - name: Build windows_raise_widget example with CMake
        working-directory: examples/windows_raise_widget/
        run: |
          cmake . ${{ matrix.additional_arguments }}
          cmake --build .

      - name: Integration test
        run: node .github/scripts/integration-tests.js

      - name: Build basic example with QMake
        if: ${{ !contains(matrix.platform, 'macos') }}
        working-directory: examples/basic/
        run: |
          qmake
          ${{ matrix.make }}

      - name: Build calculator example with QMake
        if: ${{ !contains(matrix.platform, 'macos') }}
        working-directory: examples/calculator/
        run: |
          qmake
          ${{ matrix.make }}

      - name: Build sending_arguments example with QMake
        if: ${{ !contains(matrix.platform, 'macos') }}
        working-directory: examples/sending_arguments/
        run: |
          qmake
          ${{ matrix.make }}

      - name: Build separate_object example with QMake
        if: ${{ !contains(matrix.platform, 'macos') }}
        working-directory: examples/separate_object/
        run: |
          qmake
          ${{ matrix.make }}

      - name: Build windows_raise_widget example with QMake
        if: ${{ !contains(matrix.platform, 'macos') }}
        working-directory: examples/windows_raise_widget/
        run: |
          qmake
          ${{ matrix.make }}
